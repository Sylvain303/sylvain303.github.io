<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Facture Grist</title>

    <!-- A template for showing an invoice in a Custom Widget in Grist. -->
    <!-- Uses Vue.js, moment, and the Grist Plugin API -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.5.3/vue.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.27.0/moment.min.js"></script>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

    <script src="invoice.js?ver=12"></script>
    <script src="exampleData.js"></script>

    <link rel="stylesheet" href="invoice.css?ver=22">
  </head>
  <body>
    <div id="app">
      <div class="status" v-if="status">
        <template v-if="status === 'waiting'">
          <p>En attente de données...</p>
          <ul>
            <li v-bind:class="[tableConnected ? 'done' : '']">J'ai besoin de l'accès <b>lecture de table</b>.</li>
            <li v-bind:class="[haveRows ? 'done' : '']">J'ai besoin d'au moins une ligne de données.</li>
            <li v-bind:class="[rowConnected ? 'done' : '']">J'ai besoin que <b>Sélectionner par</b> soit défini.</li>
          </ul>
          <p>Exemples :</p>
          <ul>
            <li><a class="button" href="index.html?demo=1">Une facture complète</a></li>
            <li><a class="button" href="index.html?labels=1">Une facture avec étiquettes</a></li>
          </ul>
        </template>
        <template v-else>
          {{ status }}
        </template>
      </div>
      <div class="invoice" v-if="invoice">
        <template v-if="invoice">
          <div class="top">
            <div class="block">
              <div class="header">
                <div class="meta title">Facture</div>
              </div>
              <div class="info"><span class="meta">Numéro de facture</span> #{{ invoice.Number }}</div>
              <div class="info" v-if="invoice.Issued"><div class="meta date-tag">Émise le</div> {{ invoice.Issued | asDate }}</div>
              <div class="info" v-if="invoice.Due"><div class="meta date-tag">Échéance</div> {{ invoice.Due | asDate }}</div>
            </div>

            <div class="supplier">
              <div v-for="business in (invoice.Invoicer ? [invoice.Invoicer] : [])">
                <template v-if="typeof(business) === 'string'">
                  <div class="address newlined">{{ business }}</div>
                </template>
                <template v-else>
                  <div class="address">
                    <span class="name">{{ business.Name }}</span><br />
                    {{ business.Street1 }}<br />
                    <template v-if="business.Street2">
                      {{ business.Street2 }}<br />
                    </template>
                    {{ business.City }} {{ business.State }} {{ business.Zip }}<br />
                    <template v-if="business.Country">
                      {{ business.Country }}<br />
                    </template>
                  </div>
                  <template v-if="business.Email">
                    <div class="email">{{ business.Email }}</div>
                  </template>
                  <template v-if="business.Phone">
                    <div class="phone">{{ business.Phone }}</div>
                  </template>
                  <template v-if="business.Website">
                    <div class="website"><a v-bind:href="business.Url">{{ business.Website }}</a></div>
                  </template>
                </template>
              </div>
            </div>
          </div>

          <div class="client" v-for="business in (invoice.Client ? [invoice.Client] : [])">
            <div class="title">Client</div>
            <div class="details">
              <template v-if="typeof(business) === 'string'">
                <div class="newlined">{{ business }}</div>
              </template>
              <template v-else>
                <div>{{ business.Name }}</div>
                <template v-if="business.Street1">
                  {{ business.Street1 }},
                </template>
                <template v-if="business.Street2">
                  {{ business.Street2 }},
                </template>
                {{ business.City }} {{ business.State }} {{ business.Zip }}
                <template v-if="business.Country">
                  <br />{{ business.Country }}
                </template>
              </template>
            </div>
          </div>

          <table class="items">
            <template v-if="!Array.isArray(invoice.Items)">
              <tr>
                <th>Description</th>
                <th class="money">Total</th>
              </tr>
              <tr>
                <td>{{ invoice.Items }}</td>
                <td class="money">{{ invoice.Total | currency }}</td>
              </tr>
            </template>
            <template v-else>
              <tr>
                <th>Description</th>
                <th class="money">Prix unitaire</th>
                <th class="number">Quantité</th>
                <th class="money">Total</th>
              </tr>
              <tr v-for="item in invoice.Items">
                <td>{{ item.Description }}</td>
                <td class="money">{{ item.Price | currency }}</td>
                <td class="number">{{ item.Quantity }}</td>
                <td class="money">{{ item.Total | currency }}</td>
              </tr>
            </template>
          </table>

          <div class="summary">
            <div class="part">
              <div class="title">Sous-total</div>
              <div class="details">{{ invoice.Subtotal | currency }}</div>
            </div>
            <div class="part">
              <div class="title">Déduction</div>
              <div class="details">{{ invoice.Deduction | currency }}</div>
            </div>
            <div class="part">
              <div class="title">Taxes</div>
              <div class="details">{{ invoice.Taxes | currency }}</div>
            </div>
            <div class="total">
              <div class="title">Total</div>
              <div class="details">{{ invoice.Total | currency }}</div>
            </div>
          </div>

          <template v-if="invoice.Note">
            <p class="note">{{ invoice.Note }}</p>
          </template>

          <template v-for="help in (invoice.Help ? [invoice.Help] : [])">
            <div class="help">
              <div class="help-close">
                Ajoutez une date <span class="column-name">Due</span> ou <span class="column-name">Issued</span> pour masquer cette aide.
              </div>
              <div class="title">Informations sur les colonnes</div>
              <div class="details">
                <table>
                  <tr v-for="group in ['recognized', 'expected', 'ignored']">
                    <td class="key">{{ group }}</td>
                    <td>
                      <template v-if="group in help">
                        <div v-bind:class="['column-name', 'column-' + group]" v-for="col in help[group]">{{col}}</div>
                      </template>
                      <template v-else>
                        &mdash;
                      </template>
                    </td>
                  </tr>
                </table>
                <template v-if="invoice.SuggestReferencesColumn">
                  <div>Pour des informations d'adresse et d'articles structurées, ajoutez une colonne <span class="column-name">References</span> avec cette formule :</div>
                  <div>
                    <pre>RECORD(rec, expand_refs=1)</pre>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <template v-if="invoice.Paid">
            <div class="paid">
              PAYÉ
            </div>
          </template>

          <div class="footer">
            <div class="thanks">
              Merci !
            </div>
          </div>

          <div class="print">
            <a href="javascript:window.print()">Imprimer</a>
          </div>
        </template>
      </div>
    </div>
  </body>
</html>
